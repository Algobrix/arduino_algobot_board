name: Publish Dev Package

on:
  release:
    types:
      - published

env:
  DEV_BRANCH: dev-package-index
  OUTPUT_FILENAME: package_Algobot_dev_index.json
  TEMPLATE_FILENAME: .github/workflows/platform_template_dev.json
  COMMIT_NAME: github-actions[bot]
  COMMIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

jobs:
  publish-dev:
    name: Build and publish dev Arduino package
    if: ${{ github.event.release.target_commitish != 'master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout source tag
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name || github.ref_name }}
        path: source

    - name: Derive version from release tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        if [[ -z "$VERSION" || "$VERSION" == "$TAG" && "$TAG" == "v" ]]; then
          echo "Invalid release tag: '$TAG'" >&2
          exit 1
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build package archive
      id: build
      working-directory: source
      run: |
        chmod +x scripts/build-package.sh scripts/update-package-index.sh
        BUILD_OUTPUT="$(VERSION_OVERRIDE='${{ steps.version.outputs.VERSION }}' PLATFORM_NAME_OVERRIDE='Tangible and GoAlgo (dev)' BOARD_KEY_OVERRIDE='algobotpbdev' BOARD_NAME_OVERRIDE='Tangible and GoAlgo Firmware (dev)' scripts/build-package.sh)"
        echo "$BUILD_OUTPUT"
        echo "$BUILD_OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: source/${{ steps.build.outputs.ARCHIVE_NAME }}

    - name: Mark release as prerelease
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: context.payload.release.id,
            prerelease: true
          })

    - name: Checkout output repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: output

    - name: Switch to dev package branch
      working-directory: output
      run: |
        git fetch origin
        if git ls-remote --exit-code --heads origin "${DEV_BRANCH}" >/dev/null 2>&1; then
          git checkout -B "${DEV_BRANCH}" "origin/${DEV_BRANCH}"
        else
          git checkout -B "${DEV_BRANCH}" "origin/${{ github.event.repository.default_branch }}"
        fi

    - name: Update dev package index and artifact
      run: |
        if [[ ! -f "output/${OUTPUT_FILENAME}" ]]; then
          cp "source/${OUTPUT_FILENAME}" "output/${OUTPUT_FILENAME}"
        fi
        TEMPLATE_PATH="source/${TEMPLATE_FILENAME}"
        if [[ ! -f "$TEMPLATE_PATH" ]]; then
          BASE_TEMPLATE="source/.github/workflows/platform_template.json"
          if [[ ! -f "$BASE_TEMPLATE" ]]; then
            echo "Template file not found: $TEMPLATE_PATH or $BASE_TEMPLATE" >&2
            exit 1
          fi
          TEMPLATE_PATH="$(mktemp)"
          jq '.name = "Tangible and GoAlgo (dev)"' "$BASE_TEMPLATE" > "$TEMPLATE_PATH"
        fi
        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${{ steps.build.outputs.ARCHIVE_NAME }}"
        source/scripts/update-package-index.sh \
          "output/${OUTPUT_FILENAME}" \
          "$TEMPLATE_PATH" \
          "source/${{ steps.build.outputs.ARCHIVE_NAME }}" \
          "$DOWNLOAD_URL"

    - name: Commit and push dev package index
      working-directory: output
      run: |
        git config user.name "${COMMIT_NAME}"
        git config user.email "${COMMIT_EMAIL}"
        git add "${OUTPUT_FILENAME}"
        git diff --cached --quiet && exit 0
        git commit -m "Add dev package ${{ steps.version.outputs.VERSION }}"
        git push origin "${DEV_BRANCH}"
