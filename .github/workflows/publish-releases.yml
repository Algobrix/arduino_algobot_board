name: Release Workflow

on:
  release:
    types:
      - published

env:
  OUTPUT_FILENAME: package_Algobot_index.json
  TEMPLATE_FILENAME: .github/workflows/platform_template.json
  COMMIT_NAME: github-actions[bot]
  COMMIT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

jobs:
  publish:
    name: Build and publish Arduino package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout release tag
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.release.tag_name || github.ref_name }}
        path: source

    - name: Derive version from release tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        if [[ -z "$VERSION" || "$VERSION" == "$TAG" && "$TAG" == "v" ]]; then
          echo "Invalid release tag: '$TAG'" >&2
          exit 1
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Build package archive
      id: build
      working-directory: source
      run: |
        chmod +x scripts/build-package.sh scripts/update-package-index.sh
        BUILD_OUTPUT="$(VERSION_OVERRIDE='${{ steps.version.outputs.VERSION }}' scripts/build-package.sh)"
        echo "$BUILD_OUTPUT"
        echo "$BUILD_OUTPUT" >> "$GITHUB_OUTPUT"

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: source/${{ steps.build.outputs.ARCHIVE_NAME }}

    - name: Checkout output branch
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.repository.default_branch }}
        path: output

    - name: Update package index
      run: |
        DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/${{ steps.build.outputs.ARCHIVE_NAME }}"
        source/scripts/update-package-index.sh \
          "output/${OUTPUT_FILENAME}" \
          "source/${TEMPLATE_FILENAME}" \
          "source/${{ steps.build.outputs.ARCHIVE_NAME }}" \
          "$DOWNLOAD_URL"

    - name: Commit updated package index
      working-directory: output
      run: |
        git config user.name "${COMMIT_NAME}"
        git config user.email "${COMMIT_EMAIL}"
        git add "${OUTPUT_FILENAME}"
        git diff --cached --quiet && exit 0
        git commit -m "Add ${{ github.event.release.tag_name }} release"
        git push origin "${{ github.event.repository.default_branch }}"
